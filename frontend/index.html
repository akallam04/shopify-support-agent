<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="api-base" content="" />
    <title>Aurora Outfitters Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="chat" role="main">
      <header class="chat__header">
        <div class="brand">
          <svg class="brand__mark" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M2 27 L11 9 L16 18 L20 12 L30 27 Z" />
            <circle cx="24" cy="7" r="3" />
          </svg>
          <div class="brand__text">
            <span class="brand__name">Aurora Outfitters</span>
            <span class="brand__role">Support Assistant</span>
          </div>
        </div>
        <span class="status" title="Online"><span class="status__dot"></span>Online</span>
      </header>

      <section class="messages" id="messages" aria-live="polite"></section>

      <form class="composer" id="composer" autocomplete="off">
        <input
          class="composer__input"
          id="input"
          type="text"
          placeholder="Ask about products, orders, or policies..."
          aria-label="Message"
          maxlength="1000"
        />
        <button class="composer__send" id="send" type="submit" aria-label="Send">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11 L21 3 L13 21 L11 13 Z" /></svg>
        </button>
      </form>
      <p class="disclaimer">Demo assistant for a test store. Answers come from live catalog, order, and policy data.</p>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
