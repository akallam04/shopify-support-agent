<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="api-base" content="https://8e0p0ih798.execute-api.us-east-1.amazonaws.com" />
    <meta name="color-scheme" content="dark" />
    <title>Aurora Outfitters Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="aurora" aria-hidden="true">
      <span class="aurora__blob aurora__blob--a"></span>
      <span class="aurora__blob aurora__blob--b"></span>
      <span class="aurora__blob aurora__blob--c"></span>
      <span class="aurora__grain"></span>
    </div>

    <main class="chat" role="main">
      <header class="chat__header">
        <div class="brand">
          <span class="brand__mark" aria-hidden="true">
            <svg viewBox="0 0 40 40">
              <path class="peak" d="M5 32 L15 13 L21 23 L26 15 L35 32 Z" />
              <circle class="sun" cx="29" cy="10" r="3.2" />
            </svg>
          </span>
          <span class="brand__text">
            <span class="brand__name">Aurora Outfitters</span>
            <span class="brand__role">Customer Support</span>
          </span>
        </div>
        <span class="status" title="Online"><span class="status__dot"></span>Online</span>
      </header>

      <section class="messages" id="messages" aria-live="polite"></section>

      <form class="composer" id="composer" autocomplete="off">
        <div class="composer__field">
          <input
            class="composer__input"
            id="input"
            type="text"
            placeholder="Ask about products, orders, or policies..."
            aria-label="Message"
            maxlength="1000"
          />
          <button class="composer__send" id="send" type="submit" aria-label="Send">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.4 20.4 L21 12 L3.4 3.6 L3.4 10 L15 12 L3.4 14 Z" /></svg>
          </button>
        </div>
      </form>
      <p class="disclaimer">Demo assistant on a test store. Replies use live catalog, order, and policy data.</p>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
